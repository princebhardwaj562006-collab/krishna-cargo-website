<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Thank You | Krishna Cargo Carrier</title>

    <meta name="robots" content="noindex">

    <link rel="icon" href="logo.png">

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 20px;

            background: linear-gradient(135deg, #eef4ff, #ffffff);

            font-family: Arial, Helvetica, sans-serif;

        }

        .thank-box {

            width: 100%;

            max-width: 700px;

            background: white;

            padding: 50px 40px;

            border-radius: 18px;

            text-align: center;

            box-shadow: 0 15px 40px rgba(0, 0, 0, .12);

        }

        .success {

            width: 100px;

            height: 100px;

            margin: auto;

            border-radius: 50%;

            background: #e9f8ef;

            display: flex;

            justify-content: center;

            align-items: center;

            margin-bottom: 25px;

        }

        .success i {

            font-size: 55px;

            color: #28a745;

        }

        h1 {

            color: #0f4c81;

            margin-bottom: 15px;

            font-size: 2.3rem;

        }

        p {

            color: #555;

            line-height: 1.8;

            font-size: 17px;

            margin-bottom: 35px;

        }

        .btn-group {

            display: flex;

            justify-content: center;

            flex-wrap: wrap;

            gap: 15px;

        }

        .btn {

            display: inline-flex;

            align-items: center;

            gap: 10px;

            padding: 14px 28px;

            border-radius: 8px;

            text-decoration: none;

            color: white;

            font-weight: 600;

            transition: .3s;

        }

        .btn:hover {

            transform: translateY(-3px);

        }

        .home {

            background: #0f4c81;

        }

        .call {

            background: #198754;

        }

        .whatsapp {

            background: #25D366;

        }

        @media(max-width:768px) {

            .thank-box {

                padding: 35px 25px;

            }

            h1 {

                font-size: 1.8rem;

            }

            .btn {

                width: 100%;

                justify-content: center;

            }

        }
    </style>

</head>

<body>

    <div class="thank-box">

        <div class="success">

            <i class="fa-solid fa-circle-check"></i>

        </div>

        <h1>Thank You!</h1>

        <p>

            Your quotation request has been submitted successfully.

            Our logistics team has received your enquiry and will contact you shortly.

            For urgent bookings, feel free to call us directly or send us a WhatsApp message.

        </p>

        <div class="btn-group">

            <a href="/" class="btn home">

                <i class="fa-solid fa-house"></i>

                Back to Home

            </a>

            <a href="tel:+919813755160" class="btn call">

                <i class="fa-solid fa-phone"></i>

                Call Now

            </a>

            <a href="https://wa.me/919813755160"
                class="btn whatsapp"
                target="_blank">

                <i class="fa-brands fa-whatsapp"></i>

                WhatsApp Us

            </a>

        </div>

    </div>

</body>

</html>
